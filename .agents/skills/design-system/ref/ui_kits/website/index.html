<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Kimono One — Website UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; background: #fff; font-family: var(--font-sans); color: var(--gray-800); }
  * { box-sizing: border-box; }
  .ghost-btn { display:inline-flex; align-items:center; justify-content:center; height:36px; min-width:36px; border:0; background:transparent; color:var(--gray-700); cursor:pointer; border-radius:8px; padding:0 8px; }
  .ghost-btn:hover { background: var(--sakura-50); color: var(--sakura-700); }

  .glass-panel-light {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255, 255, 255, 0.5);
  }
  .eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .25em; color: var(--sakura-500); }

  @keyframes sakura-fall {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    5% { opacity: .8; }
    25% { transform: translateY(25vh) translateX(-15vw) rotate(90deg); }
    50% { transform: translateY(50vh) translateX(-25vw) rotate(180deg); opacity: .7; }
    75% { transform: translateY(75vh) translateX(-35vw) rotate(270deg); }
    100% { transform: translateY(100vh) translateX(-45vw) rotate(360deg); opacity: 0; }
  }
  @keyframes fade-in-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
  @keyframes fade-in-scale { from { opacity: 0; transform: translateY(30px) scale(.95);} to { opacity: 1; transform: none; } }
  @keyframes sparkle-pulse { 0%, 100% { opacity: 1; transform: scale(1) rotate(0deg);} 50% { opacity: .5; transform: scale(1.3) rotate(15deg);} }
  .animate-hero-title { animation: fade-in-up .8s ease-out .3s both; }
  .animate-hero-subtitle { animation: fade-in-up .8s ease-out .9s both; }
  .animate-hero-search { animation: fade-in-scale .8s ease-out 1.1s both; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Brand.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="SearchPanel.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="PlanCard.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const PALETTE = [
      { glyph: '👘', bg: 'linear-gradient(135deg, #ffefeb, #f5f0e8)' },
      { glyph: '🌸', bg: 'linear-gradient(135deg, #fff8f6, #ffddd6)' },
      { glyph: '⛩️', bg: 'linear-gradient(135deg, #fdfbf7, #ffede9)' },
      { glyph: '🏮', bg: 'linear-gradient(135deg, #ffd5cc, #fff8f6)' },
      { glyph: '🎋', bg: 'linear-gradient(135deg, #f5f0e8, #ffefeb)' },
      { glyph: '🍡', bg: 'linear-gradient(135deg, #fff8f6, #fdfbf7)' },
      { glyph: '🌿', bg: 'linear-gradient(135deg, #f5f0e8, #ffd5cc)' },
      { glyph: '🪭', bg: 'linear-gradient(135deg, #ffede9, #f5f0e8)' },
    ];

    const FEATURED_PLANS = [
      {
        id: 1, ...PALETTE[0],
        location: '浅草本店', store: '京都和服屋', rating: '4.8',
        title: '春日樱花和服女士套餐｜含妆发摄影',
        price: 3000, savings: 800, badge: { text: '⭐ 为您推荐', color: 'warning' },
      },
      {
        id: 2, ...PALETTE[1],
        location: '京都祇园', store: '雅之屋', rating: '4.9',
        title: '正式礼装 振袖体验｜成人式专属套餐',
        price: 5800, savings: null, badge: null,
      },
      {
        id: 3, ...PALETTE[2],
        location: '浅草本店', store: '伝統屋', rating: '4.7',
        title: '情侣双人和服套餐｜含发型 + 双人摄影',
        price: 4800, savings: 1200, badge: { text: '⭐ 热门', color: 'warning' },
      },
      {
        id: 4, ...PALETTE[3],
        location: '京都岚山', store: '一期一会', rating: '4.9',
        title: '男士袴套装｜传统配色',
        price: 3800, savings: null, badge: null,
      },
    ];

    const SEASONAL_PLANS = [
      {
        id: 5, ...PALETTE[4],
        location: '京都祇园', store: '春之屋', rating: '4.8',
        title: '春樱限定｜浅粉色和服女士套餐',
        price: 3500, savings: 500, badge: { text: '🌸 季节限定', color: 'warning' },
      },
      {
        id: 6, ...PALETTE[5],
        location: '京都北野', store: '雅之屋', rating: '4.9',
        title: '夜樱赏花夜间套餐｜含点灯摄影',
        price: 4200, savings: null, badge: { text: '夜间', color: 'warning' },
      },
      {
        id: 7, ...PALETTE[6],
        location: '浅草本店', store: '京都和服屋', rating: '4.7',
        title: '闺蜜三人套餐｜含全员妆发',
        price: 8500, savings: 2000, badge: null,
      },
      {
        id: 8, ...PALETTE[7],
        location: '京都祇园', store: '雅之屋', rating: '4.6',
        title: '亲子家庭套餐｜含童装',
        price: 6800, savings: 1500, badge: { text: '家庭推荐', color: 'warning' },
      },
    ];

    function App() {
      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });
      return (
        <div data-screen-label="01 Homepage">
          <Header />
          <Hero />
          <TrustBar />
          <PlanGrid eyebrow="Featured Plans" title="精选热门套餐" subtitle="每周精选的高人气和服体验" plans={FEATURED_PLANS} />
          <PlanGrid eyebrow="Seasonal" title="春日限定" subtitle="樱花季限时上线，把最美的春天穿在身上" plans={SEASONAL_PLANS} />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
